name: Run Audit & Deploy

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URL to audit'
        required: true
        default: 'https://dev.rrone.in/'
      max_pages:
        description: 'Max pages to audit'
        required: false
        default: '20'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: master
          path: source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Install Playwright + Chrome
        working-directory: source
        run: npx playwright install --with-deps chromium

      - name: Run audit
        working-directory: source
        run: npx tsx src/cli.ts "${{ inputs.url }}" --max-pages ${{ inputs.max_pages }} --output ../audit-output
        timeout-minutes: 15

      - name: Prepare deployment
        run: |
          mkdir -p audits

          REPORT_HTML=$(ls audit-output/audit-*.html 2>/dev/null | head -1)
          if [ -z "$REPORT_HTML" ]; then echo "No report generated"; exit 1; fi

          TIMESTAMP=$(basename "$REPORT_HTML" .html | sed 's/audit-//')
          AUDIT_DIR="audits/${TIMESTAMP}"
          mkdir -p "$AUDIT_DIR"

          # Copy only HTML report
          cp "$REPORT_HTML" "$AUDIT_DIR/index.html"

          # Copy screenshots
          if [ -d "audit-output/screenshots" ]; then
            cp -r audit-output/screenshots "$AUDIT_DIR/"
            sed -i 's|screenshots/|./screenshots/|g' "$AUDIT_DIR/index.html"
          fi

          # Keep only 5 most recent audits
          AUDIT_COUNT=$(ls -d audits/*/ 2>/dev/null | wc -l)
          if [ "$AUDIT_COUNT" -gt 5 ]; then
            ls -d audits/*/ | sort -r | tail -n +6 | while read dir; do
              echo "Removing old audit: $dir"
              rm -rf "$dir"
            done
          fi

          # Generate index.html
          cat > index.html << 'HTMLHEAD'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>AutoAudit — RedRiver Rent</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box}
          body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
          .container{max-width:700px;margin:0 auto;padding:3rem 1.5rem}
          h1{font-size:1.75rem;font-weight:800;color:#fff;margin-bottom:.25rem}
          .subtitle{color:#94a3b8;font-size:.85rem;margin-bottom:2.5rem}
          .audit-list{list-style:none}
          .audit-item{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:.75rem;transition:border-color .15s}
          .audit-item:hover{border-color:#3b82f6}
          .audit-item:first-child{border-color:#16a34a;border-width:2px}
          .audit-row{display:flex;align-items:center;justify-content:space-between;gap:1rem}
          .audit-info{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
          .audit-date{font-weight:700;font-size:.9rem;color:#f1f5f9}
          .audit-time{font-size:.75rem;color:#64748b;font-family:monospace}
          .audit-badge{font-size:.6rem;font-weight:700;color:#fff;background:#16a34a;padding:.2rem .6rem;border-radius:99px}
          .view-btn{display:inline-flex;align-items:center;gap:.375rem;background:#3b82f6;color:#fff;padding:.5rem 1.25rem;border-radius:8px;font-size:.8rem;font-weight:700;text-decoration:none;transition:background .15s}
          .view-btn:hover{background:#2563eb}
          .footer{text-align:center;margin-top:3rem;font-size:.7rem;color:#475569}
          </style>
          </head>
          <body>
          <div class="container">
          <h1>AutoAudit Reports</h1>
          <p class="subtitle">Automated website audits for RedRiver Rent — last 5 runs</p>
          <ul class="audit-list">
          HTMLHEAD

          FIRST=true
          for dir in $(ls -d audits/*/ 2>/dev/null | sort -r | head -5); do
            DIRNAME=$(basename "$dir")
            # Parse timestamp: 2026-05-26T13-25-53-707Z → 2026-05-26 13:25:53 UTC
            DATE_PART=$(echo "$DIRNAME" | cut -dT -f1)
            TIME_RAW=$(echo "$DIRNAME" | cut -dT -f2 | sed 's/-[^-]*Z$//' | sed 's/-/:/g')
            DISPLAY="${DATE_PART} ${TIME_RAW} UTC"

            BADGE=""
            if [ "$FIRST" = true ]; then
              BADGE='<span class="audit-badge">LATEST</span>'
              FIRST=false
            fi

            cat >> index.html << ITEM
          <li class="audit-item">
            <div class="audit-row">
              <div class="audit-info">
                <span class="audit-date">${DATE_PART}</span>
                <span class="audit-time">${TIME_RAW} UTC</span>
                ${BADGE}
              </div>
              <a class="view-btn" href="audits/${DIRNAME}/">View Report →</a>
            </div>
          </li>
          ITEM
          done

          cat >> index.html << 'HTMLFOOT'
          </ul>
          <p class="footer">Run a new audit from <a href="https://github.com/RedRiverOne/autoaudit/actions/workflows/audit.yml" style="color:#3b82f6">GitHub Actions</a></p>
          </div>
          </body>
          </html>
          HTMLFOOT

      - name: Deploy to GitHub Pages
        run: |
          rm -rf source audit-output
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html audits/ .nojekyll
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "audit: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages
